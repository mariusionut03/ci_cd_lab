apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: go-simple-webserver
  labels:
    app: go-simple-webserver
spec:
  replicas: 10
  strategy:
    canary:
      steps:
        - setWeight: 50
        - pause: { duration: 60s }
        - setWeight: 100
  selector:
    matchLabels:
      app: go-simple-webserver
  template:
    metadata:
      labels:
        app: go-simple-webserver
    spec:
      containers:
        - name: webserver
          image: ghcr.io/mariusionut03/go-simple-webserver@sha256:sha256:7145a22167ad0c2fbd60e770ce799e86919c2387cfa195fc29ddc7eaab53a0d4
          ports:
            - containerPort: 8080
          imagePullPolicy: Always
